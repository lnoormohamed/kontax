<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Kontax — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f4;
      color: #1d2823;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: #17352e;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.015em;
      margin: 0 0 8px;
    }
    p {
      font-size: 15px;
      color: #5c655e;
      line-height: 1.5;
      max-width: 320px;
      margin: 0 auto 28px;
    }
    button {
      height: 48px;
      padding: 0 28px;
      border-radius: 12px;
      background: #17352e;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 11a3.5 3.5 0 100-7 3.5 3.5 0 000 7z"/>
      <path d="M3 20c0-3.3 2.7-5.5 6-5.5s6 2.2 6 5.5"/>
      <path d="M16 5.2a3 3 0 010 5.6"/>
      <path d="M17.5 14.4c2 .8 3.5 2.3 3.5 4.6"/>
    </svg>
  </div>
  <h1>You're offline</h1>
  <p>Check your connection and try again. Your contacts are available once you're back online.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
